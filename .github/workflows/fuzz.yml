name: Fuzz

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 06:00 UTC
  workflow_dispatch:
    inputs:
      duration:
        description: 'Fuzz duration in seconds per target'
        required: false
        default: '60'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_TARGET_DIR: target/fuzz-ci
      CARGO_INCREMENTAL: '0'
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      # cargo-fuzz needs nightly (-Zsanitizer=address, coverage passes).
      - name: Install nightly + rust-src
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable action; pin toolchain below
        with:
          toolchain: nightly
          components: rust-src

      - name: Install cargo-fuzz
        run: cargo +nightly install cargo-fuzz --locked

      - name: Fuzz lexer
        env:
          FUZZ_DURATION: ${{ inputs.duration || '60' }}
        run: |
          cargo +nightly fuzz run fuzz_lex -- \
            -max_total_time="${FUZZ_DURATION}" \
            -max_len=4096

      - name: Fuzz parser
        env:
          FUZZ_DURATION: ${{ inputs.duration || '60' }}
        run: |
          cargo +nightly fuzz run fuzz_parse -- \
            -max_total_time="${FUZZ_DURATION}" \
            -max_len=4096

      - name: Fuzz type checker
        env:
          FUZZ_DURATION: ${{ inputs.duration || '60' }}
        run: |
          cargo +nightly fuzz run fuzz_typecheck -- \
            -max_total_time="${FUZZ_DURATION}" \
            -max_len=4096

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: fuzz-crashes
          path: fuzz/artifacts/
          retention-days: 30
