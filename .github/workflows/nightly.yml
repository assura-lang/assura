name: Nightly

on:
  schedule:
    - cron: "0 4 * * *"   # 4:00 UTC daily
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  full-test:
    name: Full test suite
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CARGO_TARGET_DIR: target/ci-nightly
      CARGO_INCREMENTAL: '0'
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy, rustfmt

      - name: Cache dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: ci-nightly

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y protobuf-compiler libz3-dev
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Set Linux Z3 paths
        if: runner.os == 'Linux'
        run: |
          echo "Z3_SYS_Z3_HEADER=/usr/include/z3.h" >> "$GITHUB_ENV"
          echo "CPATH=/usr/include" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=/usr/lib/x86_64-linux-gnu" >> "$GITHUB_ENV"

      - name: Format check
        run: cargo fmt --check --all

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Full test suite
        run: cargo test --workspace

      - name: Build compiler
        run: cargo build --bin assura

      - name: E2E check all demos
        run: |
          for demo in demos/*.assura; do
            # Audit demos have intentional counterexamples (real CVE models); skip them
            case "$demo" in *-audit*|*audit-*) echo "=== Skipping audit demo $demo ==="; continue;; esac
            echo "=== Checking $demo ==="
            cargo run --bin assura -- check "$demo"
          done

      - name: E2E check all examples
        run: |
          failed=0
          for example in $(find examples -name '*.assura' | sort); do
            echo "=== Checking $example ==="
            if ! cargo run --bin assura -- check "$example"; then
              echo "FAIL: $example"
              failed=1
            fi
          done
          exit $failed

      - name: Codegen validation (demos)
        run: |
          for demo in demos/*.assura; do
            case "$demo" in *-audit*|*audit-*) continue;; esac
            echo "=== Building $demo ==="
            cargo run --bin assura -- build --no-check "$demo"
            # build writes to <input-parent>/generated/ (e.g. demos/generated/)
            gen_dir="$(dirname "$demo")/generated"
            echo "=== Checking generated Rust for $demo ==="
            (cd "$gen_dir" && cargo check)
            rm -rf "$gen_dir"
          done

  no-z3-fallback:
    name: No-Z3 fallback
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: Cache dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: ci-nightly-no-z3
      - name: Build without Z3
        run: cargo check -p assura-smt --no-default-features