#
# CI that:
#
# * checks for a Git Tag that looks like a release
# * builds artifacts with dist (archives, installers, hashes)
# * uploads those artifacts to temporary workflow zip
# * on success, uploads the artifacts to a GitHub Release
#
# Note that the GitHub Release will be created with a generated
# title/body based on your changelogs.

name: Release
# Job-level permissions only. Workflow-level pull-requests: write trips zizmor
# excessive-permissions (release-please job grants it where needed).
permissions:
  contents: read

# Release flow (release-please + cargo-dist + crates.io):
#
# 1. Every push to main runs release-please, which opens/updates a release PR
#    from conventional commits (label: autorelease: pending).
# 2. Maintainer merges that PR explicitly (never auto-merge).
# 3. On the merge push, release-please creates the tag + GitHub Release and sets
#    release_created=true. The same workflow run then builds installers (cargo-dist)
#    and publishes libraries (scripts/publish-crates.sh).
#
# GITHUB_TOKEN tags do not trigger a separate push:tags workflow, so plan/build/host
# MUST run in this same workflow when release_created is true (not only on tag push).
#
# Manual re-runs: workflow_dispatch with tag input (e.g. v0.1.0).
# Optional: human tag push still supported for break-glass.
on:
  push:
    branches: [main]
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0) for manual re-runs only"
        required: false
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # release-please opens/updates the release PR on main, or creates tag+release
  # when that PR is merged.
  release-please:
    # push to main: normal path. workflow_dispatch without tag: open/update the
    # release PR without building (plan stays gated on release_created/tag).
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.tag == '')
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      pr: ${{ steps.rp.outputs.pr }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Keep path-dep version= pins aligned with workspace version on the release PR.
  sync-path-dep-versions:
    needs: [release-please]
    if: >-
      needs.release-please.outputs.release_created != 'true' &&
      needs.release-please.outputs.pr != ''
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Get PR branch
        id: pr-branch
        env:
          PR_JSON: ${{ needs.release-please.outputs.pr }}
        run: |
          branch=$(echo "$PR_JSON" | jq -r .headBranchName)
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ steps.pr-branch.outputs.branch }}
          # false for zizmor artipacked; push uses an explicit token below.
          persist-credentials: false
      - name: Sync path-dep versions
        run: bash scripts/sync-path-dep-versions.sh
      - name: Commit and push if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet; then
            echo "path-dep versions already aligned"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/*/Cargo.toml
          git commit -s -m "chore: sync path-dep versions with workspace version"
          # GITHUB_TOKEN push will not re-trigger workflows; that is fine.
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push
          # NOTE: Do NOT edit the release-please PR body. release-please parses
          # it on merge to create the tag.

  # Run 'dist plan' (or host) to determine what tasks we need to do
  plan:
    needs: [release-please]
    # always() required: release-please is skipped on tag/dispatch events.
    # Run when a release was just created, a version tag was pushed, or a
    # manual dispatch with a tag input was requested.
    if: >-
      always() && !failure() && !cancelled() &&
      (needs.release-please.outputs.release_created == 'true' ||
       startsWith(github.ref, 'refs/tags/') ||
       (github.event_name == 'workflow_dispatch' && inputs.tag != ''))
    runs-on: "ubuntu-22.04"
    timeout-minutes: 10
    outputs:
      val: ${{ steps.plan.outputs.manifest }}
      tag: ${{ steps.resolve-tag.outputs.tag }}
      tag-flag: ${{ steps.resolve-tag.outputs.tag && format('--tag={0}', steps.resolve-tag.outputs.tag) || '' }}
      publishing: ${{ steps.resolve-tag.outputs.tag != '' }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Resolve release tag
        id: resolve-tag
        env:
          RP_TAG: ${{ needs.release-please.outputs.tag_name }}
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${RP_TAG}" ]]; then
            echo "tag=${RP_TAG}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${DISPATCH_TAG}" ]]; then
            echo "tag=${DISPATCH_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          submodules: recursive
          ref: ${{ steps.resolve-tag.outputs.tag || github.ref }}
      - name: Install dist
        # we specify bash to get pipefail; it guards against the `curl` command
        # failing. otherwise `sh` won't catch that `curl` returned non-0
        shell: bash
        run: "curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh | sh"
      - name: Cache dist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/dist
      # sure would be cool if github gave us proper conditionals...
      # so here's a doubly-nested ternary-via-truthiness to try to provide the best possible
      # functionality based on whether this is a pull_request, and whether it's from a fork.
      # (PRs run on the *source* but secrets are usually on the *target* -- that's *good*
      # but also really annoying to build CI around when it needs secrets to work right.)
      - id: plan
        run: |
          dist ${{ (!github.event.pull_request && format('host --steps=create --tag={0}', github.ref_name)) || 'plan' }} --output-format=json > plan-dist-manifest.json
          echo "dist ran successfully"
          cat plan-dist-manifest.json
          echo "manifest=$(jq -c "." plan-dist-manifest.json)" >> "$GITHUB_OUTPUT"
      - name: "Upload dist-manifest.json"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: artifacts-plan-dist-manifest
          path: plan-dist-manifest.json

  # Build and packages all the platform-specific things
  build-local-artifacts:
    name: build-local-artifacts (${{ join(matrix.targets, ', ') }})
    # Let the initial task tell us to not run (currently very blunt)
    needs:
      - plan
    # always() prevents transitive skip when release-please is skipped (tag/dispatch).
    if: ${{ always() && !failure() && !cancelled() && needs.plan.result == 'success' && fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix.include != null && (needs.plan.outputs.publishing == 'true' || fromJson(needs.plan.outputs.val).ci.github.pr_run_mode == 'upload') }}
    strategy:
      fail-fast: false
      # Target platforms/runners are computed by dist in create-release.
      # Each member of the matrix has the following arguments:
      #
      # - runner: the github runner
      # - dist-args: cli flags to pass to dist
      # - install-dist: expression to run to install dist on the runner
      #
      # Typically there will be:
      # - 1 "global" task that builds universal installers
      # - N "local" tasks that build each platform's binaries and platform-specific installers
      matrix: ${{ fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    container: ${{ matrix.container && matrix.container.image || null }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUILD_MANIFEST_NAME: target/distrib/${{ join(matrix.targets, '-') }}-dist-manifest.json
    steps:
      - name: Harden runner
        if: runner.os == 'Linux'
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: enable windows longpaths
        run: |
          git config --global core.longpaths true
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install Rust non-interactively if not already installed
        if: ${{ matrix.container }}
        run: |
          if ! command -v cargo > /dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          fi
      - name: Install dist
        run: ${{ matrix.install_dist.run }}
      # Get the dist-manifest
      - name: Fetch local artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - name: Install dependencies
        run: |
          ${{ matrix.packages_install }}
      - name: Build artifacts
        run: |
          # Actually do builds and make zips and whatnot
          dist build ${{ needs.plan.outputs.tag-flag }} --print=linkage --output-format=json ${{ matrix.dist_args }} > dist-manifest.json
          echo "dist ran successfully"
      - id: cargo-dist
        name: Post-build
        # We force bash here just because github makes it really hard to get values up
        # to "real" actions without writing to env-vars, and writing to env-vars has
        # inconsistent syntax between shell and powershell.
        shell: bash
        run: |
          # Parse out what we just built and upload it to scratch storage
          {
            echo "paths<<EOF"
            dist print-upload-files-from-manifest --manifest dist-manifest.json
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          cp dist-manifest.json "$BUILD_MANIFEST_NAME"
      - name: "Upload artifacts"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: artifacts-build-local-${{ join(matrix.targets, '_') }}
          path: |
            ${{ steps.cargo-dist.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}

  # Build and package all the platform-agnostic(ish) things
  build-global-artifacts:
    needs:
      - plan
      - build-local-artifacts
    # always() prevents transitive skip when release-please is skipped (tag/dispatch).
    if: ${{ always() && !failure() && !cancelled() && needs.plan.result == 'success' && needs.plan.outputs.publishing == 'true' }}
    runs-on: "ubuntu-22.04"
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUILD_MANIFEST_NAME: target/distrib/global-dist-manifest.json
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install cached dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/
      - run: chmod +x ~/.cargo/bin/dist
      # Get all the local artifacts for the global tasks to use (for e.g. checksums)
      - name: Fetch local artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - id: cargo-dist
        shell: bash
        run: |
          dist build ${{ needs.plan.outputs.tag-flag }} --output-format=json "--artifacts=global" > dist-manifest.json
          echo "dist ran successfully"

          # Parse out what we just built and upload it to scratch storage
          {
            echo "paths<<EOF"
            jq --raw-output ".upload_files[]" dist-manifest.json
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          cp dist-manifest.json "$BUILD_MANIFEST_NAME"
      - name: "Upload artifacts"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: artifacts-build-global
          path: |
            ${{ steps.cargo-dist.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}
  # Determines if we should publish/announce
  host:
    needs:
      - plan
      - build-local-artifacts
      - build-global-artifacts
    # Only run if we're "publishing", and only if plan, local and global didn't fail (skipped is fine)
    # always() + !cancelled: release-please may be skipped on tag/dispatch paths.
    if: ${{ always() && !cancelled() && needs.plan.result == 'success' && needs.plan.outputs.publishing == 'true' && (needs.build-global-artifacts.result == 'skipped' || needs.build-global-artifacts.result == 'success') && (needs.build-local-artifacts.result == 'skipped' || needs.build-local-artifacts.result == 'success') }}
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    runs-on: "ubuntu-22.04"
    timeout-minutes: 15
    outputs:
      val: ${{ steps.host.outputs.manifest }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          submodules: recursive
          ref: ${{ needs.plan.outputs.tag }}
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      # Create/reuse GitHub Release and attach cargo-dist artifacts.
      # Do NOT run `dist host --steps=release`: release-please already creates
      # the GitHub Release when its PR merges, and a second create fails.
      - name: "Download GitHub Artifacts"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: artifacts-*
          path: artifacts
          merge-multiple: true
      - name: Create or update GitHub Release
        id: host
        env:
          PRERELEASE_FLAG: "${{ fromJson(needs.plan.outputs.val).announcement_is_prerelease && '--prerelease' || '' }}"
          ANNOUNCEMENT_TITLE: "${{ fromJson(needs.plan.outputs.val).announcement_title }}"
          RELEASE_COMMIT: "${{ github.sha }}"
          TAG: ${{ needs.plan.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          # Prefer cargo-dist plan notes when present; release-please body stays
          # if we only upload to an existing release.
          plan_manifest=""
          if [ -f artifacts/plan-dist-manifest.json ]; then
            plan_manifest=artifacts/plan-dist-manifest.json
          else
            # download-artifact may nest by artifact name
            plan_manifest=$(find artifacts -name 'plan-dist-manifest.json' 2>/dev/null | head -1 || true)
          fi
          if [ -n "${plan_manifest}" ] && [ -f "${plan_manifest}" ]; then
            jq -r '.announcement_github_body // empty' "${plan_manifest}" > "$RUNNER_TEMP/notes.txt"
            jq -c '{ci, announcement_is_prerelease, announcement_title, releases, publish_prereleases}' \
              "${plan_manifest}" > "$RUNNER_TEMP/slim-manifest.json"
          else
            : > "$RUNNER_TEMP/notes.txt"
            echo '{}' > "$RUNNER_TEMP/slim-manifest.json"
          fi

          # Drop granular manifests so only distributable files are uploaded.
          find artifacts -name '*-dist-manifest.json' -delete 2>/dev/null || true

          mapfile -t asset_files < <(find artifacts -type f ! -name '.*' | sort)
          if [[ ${#asset_files[@]} -eq 0 ]]; then
            echo "error: no release artifacts found under artifacts/" >&2
            exit 1
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists (created by release-please). Uploading artifacts..."
            gh release upload "$TAG" "${asset_files[@]}" --clobber
          else
            # shellcheck disable=SC2086 # PRERELEASE_FLAG is empty or --prerelease
            gh release create "$TAG" --target "$RELEASE_COMMIT" $PRERELEASE_FLAG \
              --title "${ANNOUNCEMENT_TITLE:-$TAG}" \
              --notes-file "$RUNNER_TEMP/notes.txt" \
              "${asset_files[@]}"
          fi

          # Optional curated override (commit RELEASE_NOTES.md to main before merge).
          if [ -f RELEASE_NOTES.md ]; then
            echo "Applying RELEASE_NOTES.md override..."
            gh release edit "$TAG" --notes-file RELEASE_NOTES.md
          fi

          echo "manifest=$(cat "$RUNNER_TEMP/slim-manifest.json")" >> "$GITHUB_OUTPUT"

      - name: Generate SBOM
        run: |
          cargo install cargo-cyclonedx --locked
          cargo cyclonedx --format json --all
          # cargo-cyclonedx may write bom.json or assura-*.cdx.json depending on version
          if [ -f bom.json ]; then
            mv bom.json assura-sbom.cdx.json
          else
            sbom=$(find . -maxdepth 1 -name '*.cdx.json' -print -quit)
            if [ -n "$sbom" ]; then
              mv "$sbom" assura-sbom.cdx.json
            else
              echo "error: no CycloneDX SBOM produced" >&2
              exit 1
            fi
          fi

      - name: Upload SBOM to release
        run: gh release upload "${{ needs.plan.outputs.tag }}" assura-sbom.cdx.json --clobber

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: artifacts/*

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign release artifacts
        run: |
          for artifact in artifacts/*; do
            [ -f "$artifact" ] || continue
            echo "Signing ${artifact}..."
            cosign sign-blob --yes --bundle "${artifact}.sigstore.json" "${artifact}"
          done
          echo "Signing SBOM..."
          cosign sign-blob --yes --bundle assura-sbom.cdx.json.sigstore.json assura-sbom.cdx.json

      - name: Upload signatures to release
        run: |
          gh release upload "${{ needs.plan.outputs.tag }}" \
            artifacts/*.sigstore.json \
            assura-sbom.cdx.json.sigstore.json \
            --clobber

  # Publish all workspace crates to crates.io in dependency order
  publish-crates:
    needs:
      - plan
      - host
    if: ${{ always() && !cancelled() && needs.host.result == 'success' && needs.plan.outputs.publishing == 'true' }}
    runs-on: "ubuntu-22.04"
    timeout-minutes: 30
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          ref: ${{ needs.plan.outputs.tag }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Install system dependencies
        run: sudo apt-get install -y protobuf-compiler libz3-dev
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Set Linux Z3 paths
        run: |
          {
            echo "Z3_SYS_Z3_HEADER=/usr/include/z3.h"
            echo "CPATH=/usr/include"
            echo "LIBRARY_PATH=/usr/lib/x86_64-linux-gnu"
          } >> "$GITHUB_ENV"

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: bash scripts/publish-crates.sh

  announce:
    needs:
      - plan
      - host
      - publish-crates
    # Wait for publish while still allowing publish to be the only blocker when host ok.
    if: ${{ always() && !cancelled() && needs.host.result == 'success' && (needs.publish-crates.result == 'skipped' || needs.publish-crates.result == 'success') }}
    runs-on: "ubuntu-22.04"
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ needs.plan.outputs.tag }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Announce release complete
        run: |
          echo "Release pipeline finished for tag: ${TAG}"
          gh release view "$TAG" --json url,tagName,isDraft,isPrerelease \
            --jq '"url=\(.url) tag=\(.tagName) draft=\(.isDraft) prerelease=\(.isPrerelease)"'
