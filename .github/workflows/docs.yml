name: Deploy Docs

on:
  # Disabled: GitHub Pages is not enabled for this repo yet.
  # Re-enable push trigger once Pages is configured at:
  # https://github.com/assura-lang/assura/settings/pages
  #
  # push:
  #   branches: [main]
  #   paths:
  #     - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'

      - name: Build docs
        run: mdbook build docs/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/book

  deploy:
    needs: build
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5