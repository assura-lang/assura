name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 3 * * *'  # daily at 03:00 UTC to exercise full test matrix (SMT/Z3/CVC5)
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Path filter: determine which groups of files changed so jobs can skip
# themselves when their inputs are untouched.
#
# A daily schedule trigger ensures the full test matrix (incl. SMT/Z3/CVC5
# native jobs) runs regularly even without pushes/PRs.
#
# Architecture: 3 self-hosted macOS ARM64 runners (assura-mac-1/2/3) on
# the same physical Mac. The 3 heavy Rust jobs (clippy, test,
# codegen-validation) run in parallel, one per runner, for maximum
# throughput. fmt is folded into clippy (same runner, <1s overhead) to
# eliminate the serial ubuntu-latest gate that added ~15s of VM
# provisioning before any compilation could start.
#
# sccache caches compiler outputs across runs on the persistent local disk.
# Per-job CARGO_TARGET_DIR prevents cache thrashing between clippy/test/codegen.
# CARGO_INCREMENTAL=0 ensures all compilation goes through sccache.
# CARGO_BUILD_JOBS=4 limits parallel rustc processes per job so 3
# concurrent jobs (one per runner) stay within RAM on the shared Mac.
# 3 runners x 4 jobs = 12 processes peak. Reduced from 6 (18 peak)
# after repeated OOM SIGKILL failures under memory pressure (#615).
# Without this limit, cargo defaults to num_cpus (8-12 on Apple
# Silicon) x 3 runners = 24-36 processes.
#
# benchmark and cvc5 are serialized after clippy/test respectively
# to reduce concurrent RAM pressure (at most 3 heavy jobs at once).
#
# Filter groups:
#   rust           - any Rust crate or workspace file changed
#   codegen        - crates that affect code generation + demo files
#   tooling-only   - only CLI/LSP/server/fmt changed (not core pipeline)
#   editors-ts     - tree-sitter grammar
#   editors-vscode - VS Code extension
#   smt            - assura-smt crate (used to gate heavy CVC5 native jobs)
# ---------------------------------------------------------------------------
jobs:
  changes:
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: read
    outputs:
      rust:           ${{ steps.filter.outputs.rust }}
      codegen:        ${{ steps.filter.outputs.codegen }}
      tooling-only:   ${{ steps.filter.outputs.tooling-only }}
      editors-ts:     ${{ steps.filter.outputs.editors-ts }}
      editors-vscode: ${{ steps.filter.outputs.editors-vscode }}
      smt:            ${{ steps.filter.outputs.smt }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'scripts/**'
              - 'AGENTS.md'
              - '.github/workflows/ci.yml'
            codegen:
              - 'crates/assura-parser/**'
              - 'crates/assura-resolve/**'
              - 'crates/assura-types/**'
              - 'crates/assura-smt/**'
              - 'crates/assura-codegen/**'
              - 'crates/assura-config/**'
              - 'crates/assura-diagnostics/**'
              - 'demos/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            tooling-only:
              - 'crates/assura-cli/**'
              - 'crates/assura-lsp/**'
              - 'crates/assura-server/**'
              - 'crates/assura-fmt/**'
              - 'crates/assura-bench/**'
            editors-ts:
              - 'editors/tree-sitter-assura/**'
            editors-vscode:
              - 'editors/vscode/**'
            smt:
              - 'crates/assura-smt/**'
              - 'Cargo.toml'
              - 'Cargo.lock'

  # ── Clippy + fmt (runner 1) ──────────────────────────────────────────────
  # fmt is folded in here instead of being a separate ubuntu-latest gate job.
  # This eliminates ~15s of VM provisioning + rustfmt install that blocked
  # all compilation jobs. On self-hosted, rustfmt is pre-installed and fmt
  # check takes <1s.
  clippy:
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    timeout-minutes: 10
    env:
      CARGO_TARGET_DIR: target/ci-clippy
      RUSTC_WRAPPER: sccache
      CARGO_INCREMENTAL: '0'
      CARGO_BUILD_JOBS: '4'
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-rust-ci
        with:
          shared-key: ci-clippy
          toolchain-components: clippy, rustfmt
          is-self-hosted: ${{ vars.RUNNER && 'true' || 'false' }}

      - name: Format check
        run: cargo fmt --check --all

      # Fast static greps: Verifier::new outside smt/pipeline, Type::Unknown ==,
      # missing ergonomics APIs, CHECKER_PIPELINE breadth. No compile required.
      - name: Agent ergonomics guards
        if: ${{ !cancelled() }}
        run: bash scripts/agent-guards.sh

      - name: Clippy
        if: ${{ !cancelled() }}
        run: cargo clippy --workspace --locked -- -D warnings

      - name: Cleanup target (self-hosted)
        if: ${{ always() && vars.RUNNER }}
        run: rm -rf "$CARGO_TARGET_DIR"

  # ── Tests (runner 2, parallel with clippy) ───────────────────────────────
  test:
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    timeout-minutes: 15
    env:
      CARGO_TARGET_DIR: target/ci-test
      RUSTC_WRAPPER: sccache
      CARGO_INCREMENTAL: '0'
      CARGO_BUILD_JOBS: '4'
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-rust-ci
        with:
          shared-key: ci-test
          is-self-hosted: ${{ vars.RUNNER && 'true' || 'false' }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
        env:
          HOME: ${{ runner.temp }}/install-action-home

      - name: Test (nextest)
        run: cargo nextest run --workspace --locked

      - name: Cleanup target (self-hosted)
        if: ${{ always() && vars.RUNNER }}
        run: rm -rf "$CARGO_TARGET_DIR"

  # ── Pipeline benchmarks (compile + smoke run; no timing thresholds) ─────
  benchmark:
    name: Pipeline benchmarks
    needs: [changes, clippy]
    # Serialized after clippy to reduce concurrent RAM pressure on the
    # shared Mac (#615). Benchmark gets warm sccache from clippy.
    # Only run on codegen/tooling changes (incl. assura-bench) or manual dispatch.
    if: ${{ always() && !failure() && !cancelled() && (needs.changes.outputs.codegen == 'true' || needs.changes.outputs.tooling-only == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') }}
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    timeout-minutes: 10
    env:
      CARGO_TARGET_DIR: target/ci-bench
      RUSTC_WRAPPER: sccache
      CARGO_INCREMENTAL: '0'
      CARGO_BUILD_JOBS: '4'
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-rust-ci
        with:
          shared-key: ci-bench
          is-self-hosted: ${{ vars.RUNNER && 'true' || 'false' }}

      - name: Run pipeline benchmarks (smoke + compile check only)
        # Run only full_pipeline bench in CI (smoke to ensure it compiles/runs).
        # Minimum valid Criterion sample-size is 10. Use quiet + noplot for speed. No thresholds.
        run: cargo bench -p assura-bench --locked --bench pipeline full_pipeline -- --sample-size 10 --quiet --noplot

      - name: Upload benchmark output
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: assura-bench-${{ github.sha }}
          path: target/ci-bench/criterion/**
          if-no-files-found: ignore

      - name: Cleanup target (self-hosted)
        if: ${{ always() && vars.RUNNER }}
        run: rm -rf "$CARGO_TARGET_DIR"

  # ── Generated code compiles (runner 3, parallel with clippy + test) ─────
  codegen-validation:
    name: Generated code compiles
    needs: changes
    if: ${{ needs.changes.outputs.codegen == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    timeout-minutes: 15
    env:
      CARGO_TARGET_DIR: target/ci-codegen
      RUSTC_WRAPPER: sccache
      CARGO_INCREMENTAL: '0'
      CARGO_BUILD_JOBS: '4'
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-rust-ci
        with:
          shared-key: ci-codegen
          is-self-hosted: ${{ vars.RUNNER && 'true' || 'false' }}

      - name: Build compiler
        run: cargo build --bin assura --locked

      - name: E2E check all demos (parse + resolve + typecheck + verify)
        run: |
          for demo in demos/*.assura; do
            echo "=== Checking $demo ==="
            cargo run --locked --bin assura -- check "$demo"
          done

      - name: Validate generated code for demos
        if: ${{ !cancelled() }}
        run: |
          for demo in demos/*.assura; do
            echo "=== Building $demo ==="
            cargo run --locked --bin assura -- build --no-check "$demo"
            echo "=== Checking generated Rust for $demo ==="
            (cd generated && cargo check)
            rm -rf generated
          done

      - name: Cleanup target (self-hosted)
        if: ${{ always() && vars.RUNNER }}
        run: rm -rf "$CARGO_TARGET_DIR"

  # ── No-Z3 fallback check (~30s on ubuntu) ───────────────────────────────
  no-z3:
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust-ci
        with:
          shared-key: ci-no-z3
          install-system-deps: 'false'
          is-self-hosted: ${{ vars.RUNNER && 'true' || 'false' }}

      - name: Build without Z3 (graceful fallback)
        run: cargo check -p assura-smt --no-default-features --locked

  # ── CVC5 native integration tests ───────────────────────────────────────
  cvc5:
    name: CVC5 native tests
    needs: [changes, test]
    # Serialized after test to reduce concurrent RAM pressure on the
    # shared Mac (#615). CVC5 gets warm sccache from test.
    if: ${{ always() && !failure() && !cancelled() && (needs.changes.outputs.smt == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') }}
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    timeout-minutes: 15
    env:
      CARGO_TARGET_DIR: target/ci-cvc5
      RUSTC_WRAPPER: sccache
      CARGO_INCREMENTAL: '0'
      CARGO_BUILD_JOBS: '4'
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-rust-ci
        with:
          shared-key: ci-cvc5
          is-self-hosted: ${{ vars.RUNNER && 'true' || 'false' }}

      - name: Install CVC5 prebuilt library
        run: |
          if [ "$(uname)" = "Darwin" ]; then
            ARCH=$(uname -m)
            curl -sL "https://github.com/cvc5/cvc5/releases/latest/download/cvc5-macOS-${ARCH}-static.zip" -o /tmp/cvc5.zip
            unzip -o /tmp/cvc5.zip -d /tmp/cvc5-install
            echo "CVC5_LIB_DIR=/tmp/cvc5-install/cvc5-macOS-${ARCH}-static/lib" >> "$GITHUB_ENV"
            echo "CVC5_INCLUDE_DIR=/tmp/cvc5-install/cvc5-macOS-${ARCH}-static/include" >> "$GITHUB_ENV"
          else
            curl -sL "https://github.com/cvc5/cvc5/releases/latest/download/cvc5-Linux-x86_64-static.zip" -o /tmp/cvc5.zip
            unzip -o /tmp/cvc5.zip -d /tmp/cvc5-install
            echo "CVC5_LIB_DIR=/tmp/cvc5-install/cvc5-Linux-x86_64-static/lib" >> "$GITHUB_ENV"
            echo "CVC5_INCLUDE_DIR=/tmp/cvc5-install/cvc5-Linux-x86_64-static/include" >> "$GITHUB_ENV"
          fi

      - name: Clippy with CVC5 native
        run: cargo clippy -p assura-smt --features cvc5-verify --locked -- -D warnings

      - name: Test assura-smt with CVC5 native
        if: ${{ !cancelled() }}
        run: cargo test -p assura-smt --features cvc5-verify --locked

      - name: Verify portfolio solver with CVC5
        if: ${{ !cancelled() }}
        run: |
          cargo build --bin assura --features cvc5-verify --locked
          cargo run --locked --bin assura --features cvc5-verify -- check --solver cvc5 demos/libwebp-huffman.assura

      - name: Cleanup target (self-hosted)
        if: ${{ always() && vars.RUNNER }}
        run: rm -rf "$CARGO_TARGET_DIR"

  # ── Tree-sitter grammar tests ───────────────────────────────────────────
  tree-sitter:
    name: Tree-sitter grammar tests
    needs: changes
    if: ${{ needs.changes.outputs.editors-ts == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: editors/tree-sitter-assura
        run: npm install

      - name: Generate parser
        working-directory: editors/tree-sitter-assura
        run: npx tree-sitter generate

      - name: Run tree-sitter tests
        working-directory: editors/tree-sitter-assura
        run: npx tree-sitter test

  # ── VS Code extension compiles ──────────────────────────────────────────
  vscode-extension:
    name: VS Code extension compiles
    needs: changes
    if: ${{ needs.changes.outputs.editors-vscode == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: editors/vscode
        run: npm install

      - name: Compile TypeScript
        working-directory: editors/vscode
        run: npx tsc -p ./
