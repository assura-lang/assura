name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        if: ${{ !vars.RUNNER }}
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache dependencies
        if: ${{ !vars.RUNNER }}
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y protobuf-compiler libz3-dev
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Set Linux Z3 paths
        if: runner.os == 'Linux'
        run: |
          echo "Z3_SYS_Z3_HEADER=/usr/include/z3.h" >> "$GITHUB_ENV"
          echo "CPATH=/usr/include" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=/usr/lib/x86_64-linux-gnu" >> "$GITHUB_ENV"

      - name: Check formatting
        run: cargo fmt --check --all

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

      - name: Build without Z3 (graceful fallback)
        run: cargo check -p assura-smt --no-default-features

  tree-sitter:
    name: Tree-sitter grammar tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Generate parser
        working-directory: editors/tree-sitter-assura
        run: tree-sitter generate

      - name: Run tree-sitter tests
        working-directory: editors/tree-sitter-assura
        run: tree-sitter test

  vscode-extension:
    name: VS Code extension compiles
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: editors/vscode
        run: npm install

      - name: Compile TypeScript
        working-directory: editors/vscode
        run: npx tsc -p ./

  codegen-validation:
    name: Generated code compiles
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    timeout-minutes: 20
    needs: check
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        if: ${{ !vars.RUNNER }}
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        if: ${{ !vars.RUNNER }}
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y protobuf-compiler libz3-dev
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Set Linux Z3 paths
        if: runner.os == 'Linux'
        run: |
          echo "Z3_SYS_Z3_HEADER=/usr/include/z3.h" >> "$GITHUB_ENV"
          echo "CPATH=/usr/include" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=/usr/lib/x86_64-linux-gnu" >> "$GITHUB_ENV"

      - name: Build compiler
        run: cargo build --release --bin assura

      - name: Validate generated code for demos
        run: |
          for demo in demos/*.assura; do
            echo "=== Building $demo ==="
            cargo run --release --bin assura -- build --no-check "$demo"
            echo "=== Checking generated Rust for $demo ==="
            (cd generated && cargo check)
            rm -rf generated
          done
