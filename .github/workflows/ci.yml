name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Path filter: determine which groups of files changed so jobs can skip
# themselves when their inputs are untouched.
# ---------------------------------------------------------------------------
jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      pull-requests: read
    outputs:
      rust:    ${{ steps.filter.outputs.rust }}
      editors-ts: ${{ steps.filter.outputs.editors-ts }}
      editors-vscode: ${{ steps.filter.outputs.editors-vscode }}
      codegen: ${{ steps.filter.outputs.codegen }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yml'
            editors-ts:
              - 'editors/tree-sitter-assura/**'
            editors-vscode:
              - 'editors/vscode/**'
            codegen:
              - 'crates/**'
              - 'demos/**'
              - 'Cargo.toml'
              - 'Cargo.lock'

  # ── Fast gate: formatting check (~30 s) ──────────────────────────────────
  fmt:
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check --all

  # ── Clippy + Tests (parallel via nextest) ────────────────────────────────
  lint-test:
    needs: [changes, fmt]
    if: ${{ needs.changes.outputs.rust == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        if: ${{ !vars.RUNNER }}
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache dependencies
        if: ${{ !vars.RUNNER }}
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y protobuf-compiler libz3-dev
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Set Linux Z3 paths
        if: runner.os == 'Linux'
        run: |
          echo "Z3_SYS_Z3_HEADER=/usr/include/z3.h" >> "$GITHUB_ENV"
          echo "CPATH=/usr/include" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=/usr/lib/x86_64-linux-gnu" >> "$GITHUB_ENV"

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Test (nextest)
        run: cargo nextest run --workspace

  # ── No-Z3 fallback check (~1 min) ───────────────────────────────────────
  no-z3:
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build without Z3 (graceful fallback)
        run: cargo check -p assura-smt --no-default-features

  # ── Tree-sitter grammar tests ───────────────────────────────────────────
  tree-sitter:
    name: Tree-sitter grammar tests
    needs: changes
    if: ${{ needs.changes.outputs.editors-ts == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Generate parser
        working-directory: editors/tree-sitter-assura
        run: tree-sitter generate

      - name: Run tree-sitter tests
        working-directory: editors/tree-sitter-assura
        run: tree-sitter test

  # ── VS Code extension compiles ──────────────────────────────────────────
  vscode-extension:
    name: VS Code extension compiles
    needs: changes
    if: ${{ needs.changes.outputs.editors-vscode == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: editors/vscode
        run: npm install

      - name: Compile TypeScript
        working-directory: editors/vscode
        run: npx tsc -p ./

  # ── Generated code compiles (runs in PARALLEL with lint-test) ───────────
  codegen-validation:
    name: Generated code compiles
    needs: [changes, fmt]
    if: ${{ needs.changes.outputs.codegen == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        if: ${{ !vars.RUNNER }}
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        if: ${{ !vars.RUNNER }}
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y protobuf-compiler libz3-dev
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Set Linux Z3 paths
        if: runner.os == 'Linux'
        run: |
          echo "Z3_SYS_Z3_HEADER=/usr/include/z3.h" >> "$GITHUB_ENV"
          echo "CPATH=/usr/include" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=/usr/lib/x86_64-linux-gnu" >> "$GITHUB_ENV"

      - name: Build compiler
        run: cargo build --release --bin assura

      - name: Validate generated code for demos
        run: |
          for demo in demos/*.assura; do
            echo "=== Building $demo ==="
            cargo run --release --bin assura -- build --no-check "$demo"
            echo "=== Checking generated Rust for $demo ==="
            (cd generated && cargo check)
            rm -rf generated
          done
