name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Path filter: determine which groups of files changed so jobs can skip
# themselves when their inputs are untouched.
#
# Architecture: 3 self-hosted macOS ARM64 runners (assura-mac-1/2/3).
# The 3 heavy Rust jobs (clippy, test, codegen-validation) run in parallel,
# one per runner, for maximum throughput. fmt is folded into clippy (same
# runner, <1s overhead) to eliminate the serial ubuntu-latest gate that
# added ~15s of VM provisioning before any compilation could start.
#
# sccache caches compiler outputs across runs on the persistent local disk.
# Per-job CARGO_TARGET_DIR prevents cache thrashing between clippy/test/codegen.
# CARGO_INCREMENTAL=0 ensures all compilation goes through sccache.
#
# Filter groups:
#   rust           - any Rust crate or workspace file changed
#   codegen        - crates that affect code generation + demo files
#   tooling-only   - only CLI/LSP/server/fmt changed (not core pipeline)
#   editors-ts     - tree-sitter grammar
#   editors-vscode - VS Code extension
#   smt            - assura-smt crate (used to gate heavy CVC5 native jobs)
# ---------------------------------------------------------------------------
jobs:
  changes:
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: read
    outputs:
      rust:           ${{ steps.filter.outputs.rust }}
      codegen:        ${{ steps.filter.outputs.codegen }}
      tooling-only:   ${{ steps.filter.outputs.tooling-only }}
      editors-ts:     ${{ steps.filter.outputs.editors-ts }}
      editors-vscode: ${{ steps.filter.outputs.editors-vscode }}
      smt:            ${{ steps.filter.outputs.smt }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yml'
            codegen:
              - 'crates/assura-parser/**'
              - 'crates/assura-resolve/**'
              - 'crates/assura-types/**'
              - 'crates/assura-smt/**'
              - 'crates/assura-codegen/**'
              - 'crates/assura-config/**'
              - 'crates/assura-diagnostics/**'
              - 'demos/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            tooling-only:
              - 'crates/assura-cli/**'
              - 'crates/assura-lsp/**'
              - 'crates/assura-server/**'
              - 'crates/assura-fmt/**'
              - 'crates/assura-bench/**'
            editors-ts:
              - 'editors/tree-sitter-assura/**'
            editors-vscode:
              - 'editors/vscode/**'
            smt:
              - 'crates/assura-smt/**'
              - 'Cargo.toml'
              - 'Cargo.lock'

  # ── Clippy + fmt (runner 1) ──────────────────────────────────────────────
  # fmt is folded in here instead of being a separate ubuntu-latest gate job.
  # This eliminates ~15s of VM provisioning + rustfmt install that blocked
  # all compilation jobs. On self-hosted, rustfmt is pre-installed and fmt
  # check takes <1s.
  clippy:
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    timeout-minutes: 10
    env:
      CARGO_TARGET_DIR: target/ci-clippy
      RUSTC_WRAPPER: sccache
      CARGO_INCREMENTAL: '0'
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup self-hosted Rust environment
        if: ${{ vars.RUNNER }}
        run: |
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          sccache --stop-server 2>/dev/null || true
          sccache --start-server 2>/dev/null || true

      - name: Setup Rust toolchain
        if: ${{ !vars.RUNNER }}
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache dependencies
        if: ${{ !vars.RUNNER }}
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-clippy

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y protobuf-compiler libz3-dev
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Set Linux Z3 paths
        if: runner.os == 'Linux'
        run: |
          echo "Z3_SYS_Z3_HEADER=/usr/include/z3.h" >> "$GITHUB_ENV"
          echo "CPATH=/usr/include" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=/usr/lib/x86_64-linux-gnu" >> "$GITHUB_ENV"

      - name: Format check
        run: cargo fmt --check --all

      - name: Clippy
        if: ${{ !cancelled() }}
        run: cargo clippy --workspace -- -D warnings

  # ── Tests (runner 2, parallel with clippy) ───────────────────────────────
  test:
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    timeout-minutes: 15
    env:
      CARGO_TARGET_DIR: target/ci-test
      RUSTC_WRAPPER: sccache
      CARGO_INCREMENTAL: '0'
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup self-hosted Rust environment
        if: ${{ vars.RUNNER }}
        run: |
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          sccache --stop-server 2>/dev/null || true
          sccache --start-server 2>/dev/null || true

      - name: Setup Rust toolchain
        if: ${{ !vars.RUNNER }}
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        if: ${{ !vars.RUNNER }}
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-test

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y protobuf-compiler libz3-dev
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Set Linux Z3 paths
        if: runner.os == 'Linux'
        run: |
          echo "Z3_SYS_Z3_HEADER=/usr/include/z3.h" >> "$GITHUB_ENV"
          echo "CPATH=/usr/include" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=/usr/lib/x86_64-linux-gnu" >> "$GITHUB_ENV"

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
        env:
          HOME: ${{ runner.temp }}/install-action-home

      - name: Test (nextest)
        run: cargo nextest run --workspace

  # ── Pipeline benchmarks (compile + smoke run; no timing thresholds) ─────
  benchmark:
    name: Pipeline benchmarks
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    timeout-minutes: 20
    env:
      CARGO_TARGET_DIR: target/ci-bench
      RUSTC_WRAPPER: sccache
      CARGO_INCREMENTAL: '0'
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup self-hosted Rust environment
        if: ${{ vars.RUNNER }}
        run: |
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          sccache --stop-server 2>/dev/null || true
          sccache --start-server 2>/dev/null || true

      - name: Setup Rust toolchain
        if: ${{ !vars.RUNNER }}
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        if: ${{ !vars.RUNNER }}
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-bench

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y protobuf-compiler libz3-dev
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Set Linux Z3 paths
        if: runner.os == 'Linux'
        run: |
          echo "Z3_SYS_Z3_HEADER=/usr/include/z3.h" >> "$GITHUB_ENV"
          echo "CPATH=/usr/include" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=/usr/lib/x86_64-linux-gnu" >> "$GITHUB_ENV"

      - name: Run pipeline benchmarks
        run: cargo bench -p assura-bench --bench pipeline -- --sample-size 10

      - name: Upload benchmark output
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: assura-bench-${{ github.sha }}
          path: target/ci-bench/criterion/**
          if-no-files-found: ignore

  # ── Generated code compiles (runner 3, parallel with clippy + test) ─────
  codegen-validation:
    name: Generated code compiles
    needs: changes
    if: ${{ needs.changes.outputs.codegen == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    timeout-minutes: 15
    env:
      CARGO_TARGET_DIR: target/ci-codegen
      RUSTC_WRAPPER: sccache
      CARGO_INCREMENTAL: '0'
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup self-hosted Rust environment
        if: ${{ vars.RUNNER }}
        run: |
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          sccache --stop-server 2>/dev/null || true
          sccache --start-server 2>/dev/null || true

      - name: Setup Rust toolchain
        if: ${{ !vars.RUNNER }}
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        if: ${{ !vars.RUNNER }}
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-codegen

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y protobuf-compiler libz3-dev
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Set Linux Z3 paths
        if: runner.os == 'Linux'
        run: |
          echo "Z3_SYS_Z3_HEADER=/usr/include/z3.h" >> "$GITHUB_ENV"
          echo "CPATH=/usr/include" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=/usr/lib/x86_64-linux-gnu" >> "$GITHUB_ENV"

      - name: Build compiler
        run: cargo build --bin assura

      - name: E2E check all demos (parse + resolve + typecheck + verify)
        run: |
          for demo in demos/*.assura; do
            echo "=== Checking $demo ==="
            cargo run --bin assura -- check "$demo"
          done

      - name: Validate generated code for demos
        if: ${{ !cancelled() }}
        run: |
          for demo in demos/*.assura; do
            echo "=== Building $demo ==="
            cargo run --bin assura -- build --no-check "$demo"
            echo "=== Checking generated Rust for $demo ==="
            (cd generated && cargo check)
            rm -rf generated
          done

  # ── No-Z3 fallback check (~30s on ubuntu) ───────────────────────────────
  no-z3:
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Setup self-hosted Rust environment
        if: ${{ vars.RUNNER }}
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: Setup Rust toolchain
        if: ${{ !vars.RUNNER }}
        uses: dtolnay/rust-toolchain@stable
      - name: Cache dependencies
        if: ${{ !vars.RUNNER }}
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-no-z3
      - name: Build without Z3 (graceful fallback)
        run: cargo check -p assura-smt --no-default-features

  # ── CVC5 native integration tests ───────────────────────────────────────
  cvc5:
    name: CVC5 native tests
    needs: changes
    if: ${{ needs.changes.outputs.smt == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    timeout-minutes: 15
    env:
      CARGO_TARGET_DIR: target/ci-cvc5
      RUSTC_WRAPPER: sccache
      CARGO_INCREMENTAL: '0'
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup self-hosted Rust environment
        if: ${{ vars.RUNNER }}
        run: |
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          sccache --stop-server 2>/dev/null || true
          sccache --start-server 2>/dev/null || true

      - name: Setup Rust toolchain
        if: ${{ !vars.RUNNER }}
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        if: ${{ !vars.RUNNER }}
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-cvc5

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y protobuf-compiler libz3-dev
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Set Linux Z3 paths
        if: runner.os == 'Linux'
        run: |
          echo "Z3_SYS_Z3_HEADER=/usr/include/z3.h" >> "$GITHUB_ENV"
          echo "CPATH=/usr/include" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=/usr/lib/x86_64-linux-gnu" >> "$GITHUB_ENV"

      - name: Install CVC5 prebuilt library
        run: |
          if [ "$(uname)" = "Darwin" ]; then
            ARCH=$(uname -m)
            curl -sL "https://github.com/cvc5/cvc5/releases/latest/download/cvc5-macOS-${ARCH}-static.zip" -o /tmp/cvc5.zip
            unzip -o /tmp/cvc5.zip -d /tmp/cvc5-install
            echo "CVC5_LIB_DIR=/tmp/cvc5-install/cvc5-macOS-${ARCH}-static/lib" >> "$GITHUB_ENV"
            echo "CVC5_INCLUDE_DIR=/tmp/cvc5-install/cvc5-macOS-${ARCH}-static/include" >> "$GITHUB_ENV"
          else
            curl -sL "https://github.com/cvc5/cvc5/releases/latest/download/cvc5-Linux-x86_64-static.zip" -o /tmp/cvc5.zip
            unzip -o /tmp/cvc5.zip -d /tmp/cvc5-install
            echo "CVC5_LIB_DIR=/tmp/cvc5-install/cvc5-Linux-x86_64-static/lib" >> "$GITHUB_ENV"
            echo "CVC5_INCLUDE_DIR=/tmp/cvc5-install/cvc5-Linux-x86_64-static/include" >> "$GITHUB_ENV"
          fi

      - name: Clippy with CVC5 native
        run: cargo clippy -p assura-smt --features cvc5-verify -- -D warnings

      - name: Test assura-smt with CVC5 native
        if: ${{ !cancelled() }}
        run: cargo test -p assura-smt --features cvc5-verify

      - name: Verify portfolio solver with CVC5
        if: ${{ !cancelled() }}
        run: |
          cargo build --bin assura --features cvc5-verify
          cargo run --bin assura --features cvc5-verify -- check --solver cvc5 demos/libwebp-huffman.assura

  # ── Tree-sitter grammar tests ───────────────────────────────────────────
  tree-sitter:
    name: Tree-sitter grammar tests
    needs: changes
    if: ${{ needs.changes.outputs.editors-ts == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Generate parser
        working-directory: editors/tree-sitter-assura
        run: tree-sitter generate

      - name: Run tree-sitter tests
        working-directory: editors/tree-sitter-assura
        run: tree-sitter test

  # ── VS Code extension compiles ──────────────────────────────────────────
  vscode-extension:
    name: VS Code extension compiles
    needs: changes
    if: ${{ needs.changes.outputs.editors-vscode == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: editors/vscode
        run: npm install

      - name: Compile TypeScript
        working-directory: editors/vscode
        run: npx tsc -p ./
