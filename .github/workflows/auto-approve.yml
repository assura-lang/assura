name: Auto-approve

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    # Skip PRs authored by github-actions[bot] (self-approve deadlock).
    # Skip release-please PRs for auto-merge (label check below); approve is still fine
    # when author is the App bot (different identity from GITHUB_TOKEN).
    if: >-
      github.event.pull_request.user.login != 'github-actions[bot]' &&
      (github.actor == 'SebTardif' ||
       github.event.pull_request.user.login == 'dependabot[bot]' ||
       endsWith(github.event.pull_request.user.login, '[bot]'))
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      # Approve with GITHUB_TOKEN (github-actions[bot]). Works when PR author is
      # not github-actions[bot] (e.g. human, dependabot, or App bot).
      - name: Approve PR
        if: github.event.pull_request.user.login != 'github-actions[bot]'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr review --approve "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}"

      # App token for auto-merge so the merge is not attributed to GITHUB_TOKEN
      # (which suppresses post-merge push workflows — issue #785 / #790).
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.AUTO_APPROVE_CLIENT_ID }}
          private-key: ${{ secrets.AUTO_APPROVE_PRIVATE_KEY }}

      # Never auto-merge release-please PRs (maintainer controls release cadence).
      - name: Enable auto-merge
        if: >-
          !contains(github.event.pull_request.labels.*.name, 'autorelease: pending')
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr merge --auto --squash "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" \
            || echo "Could not enable auto-merge (common when PR modifies .github/workflows/* and the App lacks workflows permission, or checks not yet green). PR was approved; manual merge may be needed."
