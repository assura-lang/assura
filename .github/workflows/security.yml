name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 6:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  cargo-audit:
    name: Dependency audit
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Setup self-hosted Rust environment
        if: ${{ vars.RUNNER }}
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: Setup Rust toolchain
        if: ${{ !vars.RUNNER }}
        uses: dtolnay/rust-toolchain@stable
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # CodeQL is disabled while the repo is private (GHAS required for
  # code scanning SARIF uploads on private repos). Re-enable when
