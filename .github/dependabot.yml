version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    ignore:
      # Architectural pins -- see AGENTS.md "Crate Versioning (CRITICAL)"
      # chumsky 0.10+ has a completely different API (Parser trait, error
      # types, combinators). Upgrading requires a full parser rewrite.
      - dependency-name: chumsky
        versions: [">=0.10"]
      # ariadne 0.7+ -- check migration guide before upgrading.
      - dependency-name: ariadne
        versions: [">=0.7"]
      # z3 0.21+ -- check API changes before upgrading.
      - dependency-name: z3
        versions: [">=0.21"]
    groups:
      # tonic, prost, and tonic-build must be upgraded together;
      # individual PRs always fail because of version coupling.
      grpc-stack:
        patterns:
          - "tonic"
          - "tonic-*"
          - "prost"
          - "prost-*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      # upload-artifact and download-artifact must move together.
      artifact-actions:
        patterns:
          - "actions/upload-artifact"
          - "actions/download-artifact"
