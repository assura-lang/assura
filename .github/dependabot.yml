version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "deps"
    ignore:
      # Architectural pins -- see AGENTS.md "Crate Versioning (CRITICAL)"
      # ariadne 0.5+ changes the Report/Label API.
      - dependency-name: ariadne
        versions: [">=0.5"]
      # z3 0.13+ has significant API changes and must match the system
      # libz3 version installed in CI.
      - dependency-name: z3
        versions: [">=0.13"]
    groups:
      # tonic, prost, and tonic-build must be upgraded together;
      # individual PRs always fail because of version coupling.
      grpc-stack:
        patterns:
          - "tonic"
          - "tonic-*"
          - "prost"
          - "prost-*"

  - package-ecosystem: npm
    directory: "/editors/vscode"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "deps"

  - package-ecosystem: npm
    directory: "/editors/tree-sitter-assura"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "deps"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "ci"
    groups:
      # upload-artifact and download-artifact must move together.
      artifact-actions:
        patterns:
          - "actions/upload-artifact"
          - "actions/download-artifact"
      # init/analyze/upload-sarif must share one version (mixed pins fail CodeQL).
      codeql-action:
        patterns:
          - "github/codeql-action*"
