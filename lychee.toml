# Transient GitHub 500s / slow external sites (main link-check 2026-07-14).
max_retries = 5
retry_wait_time = 3
timeout = 30
# Lower concurrency reduces GitHub Actions IP rate / 500 storms on issue URLs.
max_concurrency = 8

# release-please CHANGELOG is dense with issue/PR URLs. GitHub intermittently
# returns HTTP 500 for those HTML pages from GHA runners (issue pages that
# redirect to pulls), which flakes main after every markdown merge. The links
# are machine-generated and still useful for humans; skip automated recheck.
exclude_path = ["CHANGELOG.md"]

exclude = [
  "localhost",
  "127\\.0\\.0\\.1",
  "file://",
  # release-please compare/tag URLs reference versions that may not exist yet
  "github\\.com/.*/compare/",
  "github\\.com/.*/releases/tag/.*v\\d",
  # Squash-merge rewrites commit SHAs; release-please CHANGELOG still links
  # pre-squash commits (404 after land). Prefer issue/PR links for humans.
  "github\\.com/.*/commit/",
  # Placeholder domains used in examples
  "example\\.com",
  # Sites that block CI runner IPs or rate-limit (HTTP 429)
  "dl\\.acm\\.org",
  "reddit\\.com",
  "news\\.ycombinator\\.com",
  # Badge services and sites that block/reset CI runner connections
  "scorecard\\.dev",
  "contributor-covenant\\.org",
  # Investigation blog; times out from GitHub Actions runners
  "metr\\.org",
]
